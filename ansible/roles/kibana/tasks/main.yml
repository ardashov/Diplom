---
- name: Install Docker
  import_role:
    name: docker

- name: Create Kibana config directory
  file:
    path: /opt/kibana/config
    state: directory
    owner: 1000
    group: 1000
    mode: '0755'

- name: Configure Kibana
  template:
    src: kibana.yml.j2
    dest: /opt/kibana/config/kibana.yml
    owner: 1000
    group: 1000
    mode: '0644'
  notify: restart kibana

- name: Run Kibana container
  docker_container:
    name: kibana
    image: docker.elastic.co/kibana/kibana:8.13.0
    state: started
    restart_policy: always
    volumes:
      - /opt/kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - "5601:5601"
    env:
      ELASTICSEARCH_HOSTS: "http://{{ elasticsearch_host }}:{{ elasticsearch_port }}"

- name: Wait for Kibana to start
  wait_for:
    host: localhost
    port: 5601
    delay: 20
    timeout: 180