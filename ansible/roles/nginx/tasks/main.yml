---
- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Copy static site files
  copy:
    src: files/site/
    dest: /var/www/html/
    owner: www-data
    mode: '0644'

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: yes